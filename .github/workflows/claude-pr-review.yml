# .github/workflows/claude-pr-review.yml
name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
          prompt: |
            Analyze this pull request and create a structured code review as a PR comment.

            ## General Design Principles (all files)
            Consistently check for violations of these principles:
            - **KISS** (Keep It Simple, Stupid): Are there unnecessarily complex solutions that could be simpler?
            - **DRY** (Don't Repeat Yourself): Is there duplicated logic that belongs in a shared function or class?
            - **YAGNI** (You Aren't Gonna Need It): Is there code built for future features that are not yet needed?
            - **SOLID**: Does any class violate the Single Responsibility, Open/Closed, or Dependency Inversion principle?

            ## Backend (Java/Quarkus – `*.java`)
            - **Layer separation**: Does a service directly access a repository from another domain? Is HTTP logic (request/response handling, status codes) placed in a service instead of a resource/controller?
            - **Single Responsibility**: Does a service have more than one business concern? Can the class name clearly describe what it does?
            - **Repository logic**: Is business logic placed in a repository/DAO instead of a service?

            ## Frontend (Nuxt.js/Vue – `*.vue`, `*.ts` in `components/`)
            - **No business logic in UI components**: Is calculation, validation, or decision logic placed directly in a component instead of a composable or store?
            - **No API calls in UI components**: Are fetch/axios/useFetch called directly in a component instead of a composable (`use*.ts`) or service?

            ## Code and Language Style
            - New code should follow a similar style to the existing codebase.
            - The language must be English throughout.
            - Tone and naming conventions should be consistent across the project.

            ## Review Format
            Structure your feedback as follows:

            ### ✅ What is well done
            (max. 3 points – only if genuinely noteworthy)

            ### 🔴 Critical issues
            (violations of the principles above, with filename and line number)

            ### 🟡 Suggestions for improvement
            (minor violations or style remarks)

            ### 💡 Verdict
            (1–2 sentences: is the PR merge-ready, or should something be addressed first?)

            Be direct and specific. Always reference the exact file and line number.
            
            When you have completed the review, post it as a PR comment using:
            gh pr comment ${{ github.event.pull_request.number }} --body "<your review>"