name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: write
  checks: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: 📊 Publish JUnit test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
            **/target/test-results/**/*.xml
            **/target/quarkus-test-report.xml
          check_name: "JUnit Tests"
          job_name: "Test Report"
          require_tests: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  calculate-version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.version.outputs.VERSION}}
      image: ${{steps.version.outputs.IMAGE}}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        if: github.ref == 'refs/heads/master'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Semantic Release
        if: github.ref == 'refs/heads/master'
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer

      - name: 🚀 Run Semantic Release (GitHub only)
        if: github.ref == 'refs/heads/master'
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --plugins \
            @semantic-release/commit-analyzer

      - name: Calculate Image Name and Version tag
        id: version
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            VERSION=$(git tag --sort=-creatordate | head -1)
          else
            VERSION="develop-$(echo ${{ github.sha }} | cut -c1-8)"  # develop-a1b2c3d4
          fi

          IMAGE=ghcr.io/$REPO_OWNER_LC/inventory-backend

          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "**Image**: $IMAGE:$VERSION" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ github.token }}

  build-jvm:
    needs: calculate-version
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 🧰 Set up Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build
        run: |
          ./mvnw -B versions:set -DnewVersion=${{needs.calculate-version.outputs.version}}
          ./mvnw -B package -DskipTests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker Image
        run: |
          docker build -t ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}} -f src/main/docker/Dockerfile.jvm .
          docker push ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Re-tag Docker Image (latest)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "Tagging as ${{needs.calculate-version.outputs.image}}:latest ..."
          docker tag ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}} ${{needs.calculate-version.outputs.image}}:latest

          echo "Pushing ${{needs.calculate-version.outputs.image}}:latest ..."
          docker push ${{needs.calculate-version.outputs.image}}:latest

      - name: 📦 Re-tag Docker Image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Tagging as ${{needs.calculate-version.outputs.image}}:develop ..."
          docker tag ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}} ${{needs.calculate-version.outputs.image}}:develop

          echo "Pushing ${{needs.calculate-version.outputs.image}}:develop ..."
          docker push ${{needs.calculate-version.outputs.image}}:develop

  build-native:
    needs: calculate-version
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm

      - name: 🧰 Set up Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build
        run: |
          ./mvnw -B versions:set -DnewVersion=${{needs.calculate-version.outputs.version}}-native
          ./mvnw -B package -DskipTests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker Image
        run: |
          docker build -t ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}}-native -f src/main/docker/Dockerfile.native .
          docker push ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}}-native
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Re-tag Docker Image (latest)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "Tagging as ${{needs.calculate-version.outputs.image}}:latest-native ..."
          docker tag ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}}-native ${{needs.calculate-version.outputs.image}}:latest-native

          echo "Pushing ${{needs.calculate-version.outputs.image}}:latest-native ..."
          docker push ${{needs.calculate-version.outputs.image}}:latest-native

      - name: 📦 Re-tag Docker Image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Tagging as ${{needs.calculate-version.outputs.image}}:develop-native ..."
          docker tag ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}}-native ${{needs.calculate-version.outputs.image}}:develop-native

          echo "Pushing ${{needs.calculate-version.outputs.image}}:develop-native ..."
          docker push ${{needs.calculate-version.outputs.image}}:develop-native

  deploy:
    needs:
     - build-native
     - calculate-version
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Trigger Production Deployment
        if: github.ref == 'refs/heads/master'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYMENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/silverminer007/inventory-deployment/dispatches \
            -d '{
              "event_type":"deploy-production",
              "client_payload":{
                "service":"backend",
                "version":"${{needs.calculate-version.outputs.version}}",
                "image":"${{needs.calculate-version.outputs.image}}"
              }
            }'

      - name: 🧪 Trigger Staging Deployment
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYMENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/silverminer007/inventory-deployment/dispatches \
            -d '{
              "event_type":"deploy-staging",
              "client_payload":{
                "service":"backend",
                "version":"${{needs.calculate-version.outputs.version}}",
                "image":"${{needs.calculate-version.outputs.image}}"
              }
            }'