name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: silverminer007/inventory-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: ./mvnw test

  build-jvm:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: ./mvnw package -DskipTests

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "tag=0.1.0" >> "$GITHUB_OUTPUT"
            else
              # Strip leading 'v' if present
              CURRENT=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

              # Analyze commits since last tag
              BUMP="patch"
              COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
              while IFS= read -r MSG; do
                if echo "$MSG" | grep -qE '^feat!:|^.*!:|BREAKING CHANGE'; then
                  BUMP="major"
                  break
                elif echo "$MSG" | grep -qE '^feat(\(.*\))?:'; then
                  BUMP="minor"
                fi
              done <<< "$COMMITS"

              case "$BUMP" in
                major) echo "tag=$((MAJOR + 1)).0.0" >> "$GITHUB_OUTPUT" ;;
                minor) echo "tag=${MAJOR}.$((MINOR + 1)).0" >> "$GITHUB_OUTPUT" ;;
                patch) echo "tag=${MAJOR}.${MINOR}.$((PATCH + 1))" >> "$GITHUB_OUTPUT" ;;
              esac
            fi
          else
            echo "tag=develop" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

      - name: Tag release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git tag "v${{ steps.version.outputs.tag }}"
          git push origin "v${{ steps.version.outputs.tag }}"

  build-native:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm
          cache: maven

      - name: Build native
        run: ./mvnw package -DskipTests -Dnative

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "tag=0.1.0-native" >> "$GITHUB_OUTPUT"
            else
              CURRENT=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

              BUMP="patch"
              COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
              while IFS= read -r MSG; do
                if echo "$MSG" | grep -qE '^feat!:|^.*!:|BREAKING CHANGE'; then
                  BUMP="major"
                  break
                elif echo "$MSG" | grep -qE '^feat(\(.*\))?:'; then
                  BUMP="minor"
                fi
              done <<< "$COMMITS"

              case "$BUMP" in
                major) echo "tag=$((MAJOR + 1)).0.0-native" >> "$GITHUB_OUTPUT" ;;
                minor) echo "tag=${MAJOR}.$((MINOR + 1)).0-native" >> "$GITHUB_OUTPUT" ;;
                patch) echo "tag=${MAJOR}.${MINOR}.$((PATCH + 1))-native" >> "$GITHUB_OUTPUT" ;;
              esac
            fi
          else
            echo "tag=develop-native" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.native
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

      - name: 🚀 Trigger Production Deployment
        if: github.ref == 'refs/heads/master'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYMENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/silverminer007/inventory-deployment/dispatches \
            -d '{
              "event_type":"deploy-production",
              "client_payload":{
                "service":"backend",
                "version":"${{steps.version.outputs.tag}}",
                "image":"${{env.IMAGE_NAME}}"
              }
            }'

      - name: 🧪 Trigger Staging Deployment
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYMENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/silverminer007/inventory-deployment/dispatches \
            -d '{
              "event_type":"deploy-staging",
              "client_payload":{
                "service":"backend",
                "version":"${{steps.version.outputs.tag}}",
                "image":"${{env.IMAGE_NAME}}"
              }
            }'