# Application
quarkus.application.name=inventory-backend
quarkus.http.port=8080

# CORS (f³r Frontend-Entwicklung)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=inventory
quarkus.datasource.password=inventory
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/inventory

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true

# Flyway (Database Migrations)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true

# OpenAPI / Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# OIDC / Keycloak (spõter aktivieren)
quarkus.oidc.enabled=false
#quarkus.oidc.auth-server-url=http://localhost:8180/realms/inventory-system
#quarkus.oidc.client-id=inventory-backend
#quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET}
#quarkus.oidc.tls.verification=none

# S3 / Hetzner Object Storage (spõter konfigurieren)
quarkus.s3.enabled=false
#quarkus.s3.endpoint-override=https://fsn1.your-objectstorage.com
#quarkus.s3.aws.region=eu-central-1
#quarkus.s3.aws.credentials.type=static
#quarkus.s3.aws.credentials.static-provider.access-key-id=${S3_ACCESS_KEY}
#quarkus.s3.aws.credentials.static-provider.secret-access-key=${S3_SECRET_KEY}

# Logging
quarkus.log.level=INFO
quarkus.log.category."de.inventory".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Dev Services (automatische PostgreSQL im Dev-Mode)
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=postgres:16-alpine
quarkus.datasource.devservices.port=5432

# Health Checks
quarkus.smallrye-health.root-path=/q/health