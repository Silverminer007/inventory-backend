# Application
quarkus.application.name=inventory-backend
quarkus.http.port=8080

# CORS (f�r Frontend-Entwicklung)
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
%dev.quarkus.http.cors.exposed-headers=Content-Disposition
%dev.quarkus.http.cors.access-control-max-age=24H

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:inventory}
quarkus.datasource.password=${DB_PASSWORD:inventory}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/inventory}

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.bind-parameters=false

# Flyway (Database Migrations)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true

# OIDC / Keycloak (sp�ter aktivieren)
quarkus.oidc.enabled=false
#quarkus.oidc.auth-server-url=http://localhost:8180/realms/inventory-system
#quarkus.oidc.client-id=inventory-backend
#quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET}
#quarkus.oidc.tls.verification=none

# S3 / Object Storage
quarkus.s3.endpoint-override=${S3_ENDPOINT:http://localhost:9000}
quarkus.s3.aws.region=${S3_REGION:us-east-1}
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=${S3_ACCESS_KEY:minioadmin}
quarkus.s3.aws.credentials.static-provider.secret-access-key=${S3_SECRET_KEY:minioadmin}
quarkus.s3.path-style-access=true
inventory.s3.bucket-name=${S3_BUCKET_NAME:inventory-images}

# Logging
quarkus.log.level=INFO
%dev.quarkus.log.category."de.henzeob".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Health Checks
quarkus.smallrye-health.root-path=/q/health

# OpenThesaurus import
inventory.openthesaurus.import.enabled=false
inventory.llm.api-key=${ANTHROPIC_API_KEY:}
inventory.llm.tagging=${LLM_TAGGING:true}