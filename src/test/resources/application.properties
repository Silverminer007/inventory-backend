inventory.openthesaurus.import.enabled=false

# Disable S3 in tests (mock bean used instead)
quarkus.s3.endpoint-override=http://localhost:9000
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=test
quarkus.s3.aws.credentials.static-provider.secret-access-key=test

quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=postgres:16-alpine
quarkus.datasource.devservices.port=5432
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus
